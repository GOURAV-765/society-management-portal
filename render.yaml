services:
  - type: web
    name: society-portal-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build && npx prisma generate
    startCommand: npx prisma db push --accept-data-loss && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLERK_PUBLISHABLE_KEY
        sync: true
      - key: CLERK_SECRET_KEY
        sync: true
      - key: ALLOWED_ORIGINS
        sync: true
      - key: DATABASE_URL
        value: file:./dev.db
